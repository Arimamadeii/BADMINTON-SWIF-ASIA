<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PT SWIF ASIA · Bagan Badminton 2026</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <header class="header">
    <div class="header-left">
      <h1>🏸 SWIF ASIA <small>BADMINTON CHAMPIONSHIP 2026</small></h1>
      <p class="subtitle">Bagan Pertandingan Grade A & B</p>
    </div>
    <div class="grade-selector">
      <button class="grade-btn active" data-grade="all">SEMUA</button>
      <button class="grade-btn" data-grade="A">GRADE A</button>
      <button class="grade-btn" data-grade="B">GRADE B</button>
    </div>
  </header>

  <!-- BRACKET ILLUSTRATION -->
  <div class="bracket-illustration">
    <div class="bracket-stage">
      <h3>🏆 GRADE A - BRACKET</h3>
      <div class="bracket-tree" id="bracketTreeA">
        <!-- Akan di-render oleh JS -->
      </div>
    </div>
    <div class="bracket-stage">
      <h3>🏆 GRADE B - BRACKET</h3>
      <div class="bracket-tree" id="bracketTreeB">
        <!-- Akan di-render oleh JS -->
      </div>
    </div>
  </div>

  <div class="bracket-wrapper">
    <div id="bracketContainer" class="bracket"></div>
  </div>
</div>

<!-- Modal Detail Pertandingan -->
<div id="matchModal" class="modal">
  <div class="modal-content">
    <span class="modal-close">&times;</span>
    <div id="modalBody">
      <!-- Konten akan diisi oleh JavaScript -->
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
