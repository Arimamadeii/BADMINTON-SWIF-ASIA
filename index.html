<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PT SWIF ASIA · Bagan Badminton 2026</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <header class="header">
    <div class="header-left">
      <h1>🏸 SWIF ASIA <small>BADMINTON CHAMPIONSHIP 2026</small></h1>
      <p class="subtitle">Bagan Turnamen Grade A & B</p>
    </div>
    <div class="grade-selector">
      <button class="grade-btn active" data-grade="all">SEMUA</button>
      <button class="grade-btn" data-grade="A">GRADE A</button>
      <button class="grade-btn" data-grade="B">GRADE B</button>
    </div>
  </header>

  <!-- BRACKET ILLUSTRATION LENGKAP -->
  <div class="bracket-illustration">
    <div class="bracket-stage">
      <h3>🏆 GRADE A - BRACKET</h3>
      <div class="bracket-tree" id="bracketTreeA"></div>
    </div>
    <div class="bracket-stage">
      <h3>🏆 GRADE B - BRACKET</h3>
      <div class="bracket-tree" id="bracketTreeB"></div>
    </div>
  </div>

  <!-- FILTER BABAK -->
  <div class="round-filter">
    <button class="round-btn active" data-round="all">SEMUA BABAK</button>
    <button class="round-btn" data-round="16">16 BESAR</button>
    <button class="round-btn" data-round="8">8 BESAR</button>
    <button class="round-btn" data-round="semifinal">SEMIFINAL</button>
    <button class="round-btn" data-round="final">FINAL</button>
  </div>

  <div class="bracket-wrapper">
    <div id="bracketContainer" class="bracket"></div>
  </div>
</div>

<!-- Modal Detail Pertandingan -->
<div id="matchModal" class="modal">
  <div class="modal-content">
    <span class="modal-close">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
