<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PT SWIF ASIA · Bagan Badminton 2026</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <header class="header">
    <div class="header-left">
      <h1>🏸 SWIF ASIA <small>BADMINTON CHAMPIONSHIP 2026</small></h1>
      <p class="subtitle">Bagan Pertandingan Grade A & B</p>
    </div>
    <div class="grade-selector">
      <button class="grade-btn active" data-grade="all">SEMUA</button>
      <button class="grade-btn" data-grade="A">GRADE A</button>
      <button class="grade-btn" data-grade="B">GRADE B</button>
    </div>
  </header>

  <div class="bracket-wrapper">
    <div id="bracketContainer" class="bracket"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
