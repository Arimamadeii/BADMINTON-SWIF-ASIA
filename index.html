<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PT SWIF ASIA · Bagan Badminton 2026</title>
  <!-- CSS terpisah -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <header class="header">
    <h1>🏸 SWIF ASIA <small>BADMINTON 2026</small></h1>
    <div class="grade-selector">
      <button class="grade-btn active" data-grade="all">SEMUA</button>
      <button class="grade-btn" data-grade="A">GRADE A</button>
      <button class="grade-btn" data-grade="B">GRADE B</button>
    </div>
  </header>

  <!-- Bagan akan di-render oleh JS di sini -->
  <div id="bracketContainer" class="bracket"></div>
</div>

<!-- JavaScript terpisah -->
<script src="script.js"></script>
</body>
</html>
